<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);font-family:var(--font-body);color:var(--fg1)}
  .wrap{padding:24px}
  .row{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
  .swatch{display:flex;flex-direction:column;gap:6px}
  .chip{width:100%;height:64px;border-radius:14px;border:1px solid rgba(0,0,0,.06)}
  .lbl{font-size:11px;color:var(--fg2);font-family:var(--font-body)}
  .name{font-size:13px;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.4px;color:var(--fg1)}
  .hex{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--fg2)}
  .specimen{display:flex;align-items:baseline;gap:14px}
  .meta{font-size:11px;color:var(--fg2);font-family:ui-monospace,Menlo,monospace}
</style></head><body><div class="wrap">
<div class="row">
  <div class="swatch" style="width:170px"><div class="chip" style="background:#EA0029"></div><div class="name">Panna Red</div><div class="hex">#EA0029</div><div class="lbl">Primary · buttons, accents, h3</div></div>
  <div class="swatch" style="width:170px"><div class="chip" style="background:#FF002D"></div><div class="name">Red Hover</div><div class="hex">#FF002D</div><div class="lbl">Button hover state</div></div>
  <div class="swatch" style="width:170px"><div class="chip" style="background:#000"></div><div class="name">Black</div><div class="hex">#000000</div><div class="lbl">Body text · footer</div></div>
</div></div></body></html>
