<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);font-family:var(--font-body);color:var(--fg1)}
  .wrap{padding:24px}
  .row{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
  .swatch{display:flex;flex-direction:column;gap:6px}
  .chip{width:100%;height:64px;border-radius:14px;border:1px solid rgba(0,0,0,.06)}
  .lbl{font-size:11px;color:var(--fg2);font-family:var(--font-body)}
  .name{font-size:13px;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.4px;color:var(--fg1)}
  .hex{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--fg2)}
  .specimen{display:flex;align-items:baseline;gap:14px}
  .meta{font-size:11px;color:var(--fg2);font-family:ui-monospace,Menlo,monospace}
</style></head><body><div class="wrap">
<div class="row" style="align-items:flex-end;gap:18px">
  <div class="swatch"><div style="width:10px;height:10px;background:#EA0029;border-radius:8px"></div><div class="lbl">10px</div></div><div class="swatch"><div style="width:20px;height:20px;background:#EA0029;border-radius:8px"></div><div class="lbl">20px</div></div><div class="swatch"><div style="width:30px;height:30px;background:#EA0029;border-radius:8px"></div><div class="lbl">30px</div></div><div class="swatch"><div style="width:50px;height:50px;background:#EA0029;border-radius:8px"></div><div class="lbl">50px</div></div><div class="swatch"><div style="width:60px;height:60px;background:#EA0029;border-radius:8px"></div><div class="lbl">60px</div></div><div class="swatch"><div style="width:100px;height:100px;background:#EA0029;border-radius:8px"></div><div class="lbl">100px</div></div>
</div>
<div class="meta" style="margin-top:14px">10/20/30 inside cards · 50/60/100 between sections · 1140px container max</div>
</div></body></html>
